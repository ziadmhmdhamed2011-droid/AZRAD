<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أَزْرَد | AZRAD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-page" class="page active">
        <div class="auth-card">
            <h1 class="logo">أَزْرَد</h1>
            <p class="subtitle">نظام النجدة الذكي</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="pass" placeholder="كلمة المرور">
                <button onclick="handleAuth('login')" class="btn-main">تسجيل الدخول</button>
                <button onclick="handleAuth('signup')" class="btn-outline">إنشاء حساب جديد</button>
            </div>

            <div class="divider">أو</div>

            <button onclick="loginGoogle()" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                متابعة باستخدام جوجل
            </button>
        </div>
    </div>

    <div id="main-app" class="page">
        <div class="top-bar">
            <div class="user-info">
                <span id="user-name">أهلاً بك</span>
                <div id="pioneer-tag" style="display:none">🏆 لقب ذهبي</div>
            </div>
            <button onclick="logout()" class="btn-logout">خروج</button>
        </div>
        
        <div class="radar-space">
            <div id="map"></div>
            <button class="sos-button">SOS</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
