    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أَزْرَد | AZRAD OS</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="pioneer-gate" class="app-page active">
        <div class="hero-overlay">
            <div class="badge-250">🏆 إصدار المبدعين الأوائل</div>
            <h1 class="hero-logo">أَزْرَد</h1>
            <p class="hero-slogan">رادار الجدعنة والإنقاذ الذكي</p>
            
            <div class="gate-buttons">
                <button class="btn-primary" onclick="handleModal('open', 'signup')">
                    <i class="fas fa-bolt"></i> حجز مكان (الـ 250 الأوائل)
                </button>
                <button class="btn-link" onclick="handleModal('open', 'login')">
                    تسجيل دخول المنقذين
                </button>
            </div>
            
            <footer class="gate-footer">
                <p><i class="fas fa-shield-halved"></i> نظام مشفر وآمن بالكامل</p>
            </footer>
        </div>
    </section>

    <div id="auth-modal" class="modal-wrapper">
        <div class="modal-content">
            <button class="close-modal" onclick="handleModal('close')"><i class="fas fa-times"></i></button>
            
            <div id="signup-box" class="auth-box">
                <h2 class="gold-text">انضم للقائمة الذهبية</h2>
                <p class="sub-text">سجل اسمك كعضو مؤسس في نظام أَزْرَد</p>
                
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-name" placeholder="الاسم الذي سيظهر للناس">
                </div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-pass" placeholder="كلمة المرور">
                </div>
                <button class="btn-submit" onclick="processAuth('signup')">تأكيد وحجز الرقم #</button>
            </div>

            <div id="login-box" class="auth-box" style="display: none;">
                <h2 class="gold-text">مرحباً بعودتك</h2>
                <p class="sub-text">أدخل بياناتك للدخول إلى الرادار</p>
                
                <div class="input-field">
                    <i class="fas fa-at"></i>
                    <input type="email" id="log-email" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="log-pass" placeholder="كلمة المرور">
                </div>
                <button class="btn-submit" onclick="processAuth('login')">دخول النظام</button>
            </div>

            <div class="auth-divider"><span>أو عبر</span></div>
            <button class="btn-google" onclick="processGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                جوجل
            </button>
        </div>
    </div>

    <main id="main-app" class="app-page">
        <header class="hud-header">
            <div class="user-profile">
                <div class="avatar-wrap">
                    <img id="u-img" src="https://ui-avatars.com/api/?name=Hero&background=D4AF37&color=fff">
                    <span id="pioneer-icon" class="crown" style="display:none">🏆</span>
                </div>
                <div class="user-info">
                    <strong id="u-name">منقذ أَزْرَد</strong>
                    <span id="u-rank">رتبة: متطوع</span>
                </div>
            </div>
            <div class="app-title-mini">AZRAD</div>
        </header>

        <div id="map"></div>

        <div class="sos-zone">
            <div class="sos-pulse"></div>
            <button class="sos-btn">SOS</button>
        </div>

        <nav class="hud-nav">
            <button class="nav-btn active"><i class="fas fa-satellite-dish"></i><span>الرادار</span></button>
            <button class="nav-btn"><i class="fas fa-bullhorn"></i><span>البلاغات</span></button>
            <button class="nav-btn"><i class="fas fa-medal"></i><span>الأوائل</span></button>
            <button class="nav-btn"><i class="fas fa-cog"></i><span>الإعدادات</span></button>
        </nav>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
