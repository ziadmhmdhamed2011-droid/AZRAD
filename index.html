<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أَزْرَد | AZRAD Login</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #D4AF37; --bg: #001220; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; }
        
        /* شاشة تسجيل الدخول الأسطورية */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #002d54, #000);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--gold);
            width: 85%; max-width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3);
            color: white; outline: none; box-sizing: border-box;
        }

        .btn-gold { 
            background: var(--gold); color: black; padding: 15px; width: 100%; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .btn-outline {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px; width: 100%; border-radius: 12px; margin-top: 15px; cursor: pointer;
        }

        /* إخفاء الشاشة بعد الدخول */
        .hide-auth { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        #main-app { padding: 20px; display: none; }
        #map { height: 400px; border-radius: 20px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: var(--gold); font-size: 2.5rem; margin-bottom: 10px;">أَزْرَد</h1>
            <p>مرحباً بك في نظام السند العالمي</p>
            
            <div id="login-inputs">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="password" placeholder="كلمة المرور">
                <button class="btn-gold" onclick="alert('قريباً: تفعيل نظام البصمة الرقمية!')">تسجيل الدخول</button>
            </div>

            <hr style="margin: 25px 0; opacity: 0.2;">
            
            <button class="btn-outline" onclick="enterAsGuest()">الدخول كضيف (Guest Mode)</button>
            <p style="font-size: 0.8rem; margin-top: 20px; color: #888;">بالدخول كضيف، ستكون صلاحياتك محدودة</p>
        </div>
    </div>

    <div id="main-app">
        <h2 id="welcome-msg">لوحة تحكم أَزْرَد</h2>
        <div id="map"></div>
        <button class="btn-gold" style="margin-top:20px; height: 60px;" onclick="sendHelp()">إرسال استغاثة</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        // وظيفة الدخول كضيف
        window.enterAsGuest = () => {
            document.getElementById('auth-screen').classList.add('hide-auth');
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "مرحباً بك (ضيف)";
            initMap();
        };

        function initMap() {
            var map = L.map('map').setView([24.7, 46.6], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        window.sendHelp = () => {
            alert("تم تشفير موقعك وإرساله لغرفة عمليات أَزْرَد ✅");
        };
    </script>
</body>
</html>
