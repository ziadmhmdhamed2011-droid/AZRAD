 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRAD ULTIMATE | أزرد النسخة المدمرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #001f3f; --glow: rgba(212, 175, 55, 0.5); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background: #000; color: white; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* خلفية سينمائية متحركة */
        .bg-video { position: fixed; inset: 0; background: radial-gradient(circle at center, var(--navy), #000); z-index: -2; }
        .stars { position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; z-index: -1; }

        /* نظام الإعلانات "بالهبل" */
        .ad-stream { position: fixed; left: 10px; top: 10px; bottom: 10px; width: 250px; pointer-events: none; z-index: 100; }
        .ad-box { 
            background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 10px; padding: 15px; margin-bottom: 10px;
            box-shadow: 0 0 15px var(--glow); pointer-events: all; animation: slideRight 0.5s ease-out; position: relative;
        }
        .ad-box i { color: var(--gold); font-size: 1.5rem; margin-bottom: 5px; }
        .close-ad { position: absolute; top: 5px; left: 5px; color: #fff; cursor: pointer; border: none; background: none; }

        @keyframes slideRight { from { transform: translateX(-110%); } to { transform: translateX(0); } }

        /* الشاشة الرئيسية - جمدان CSS */
        .main-ui { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .logo-container { position: relative; margin-bottom: 40px; }
        h1 { font-family: 'Orbitron'; font-size: 5rem; color: #fff; text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

        /* أزرار أكشن - تأثير زجاجي */
        .auth-card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; 
            border: 1px solid rgba(212,175,55,0.3); width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 1.2rem; font-weight: 900;
            margin-bottom: 15px; cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .btn-pioneer { background: linear-gradient(45deg, var(--gold), #8a6d0e); color: #000; box-shadow: 0 0 20px var(--glow); }
        .btn:hover { transform: translateY(-5px) scale(1.02); }

        /* شاشة النجاح (مخفية) */
        #success-screen { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .welcome-hero { text-align: center; animation: zoomIn 0.8s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-video"></div>
    <div class="stars"></div>

    <div class="ad-stream" id="ads">
        <div class="ad-box">
            <button class="close-ad" onclick="this.parentElement.remove()">×</button>
            <i class="fas fa-crown"></i>
            <h4>نظام النخبة</h4>
            <p>أنت الآن في حضرة "أزرد" العظيم.</p>
        </div>
        <div class="ad-box" style="animation-delay: 0.5s;">
            <button class="close-ad" onclick="this.parentElement.remove()">×</button>
            <i class="fas fa-shield-heart"></i>
            <h4>أمان مطلق</h4>
            <p>بياناتك مشفرة ببروتوكول AZ-24.</p>
        </div>
    </div>

    <div class="main-ui" id="login-ui">
        <div class="logo-container">
            <h1 id="main-logo">AZRAD</h1>
        </div>

        <div class="auth-card">
            <button class="btn btn-google" id="google-btn">
                <i class="fab fa-google"></i> تسجيل دخول بجوجل
            </button>
            <button class="btn btn-pioneer" onclick="alert('جاري تفعيل مقاعد النخبة...')">
                <i class="fas fa-gem"></i> إنشاء حساب النخبة
            </button>
            <p style="font-size: 0.8rem; text-align: center; opacity: 0.6;">باقي 250 مقعد فقط للأبطال</p>
        </div>
    </div>

    <div id="success-screen">
        <div class="welcome-hero">
            <i class="fas fa-check-circle" style="font-size: 5rem; color: var(--gold); margin-bottom: 20px;"></i>
            <h2 id="user-welcome" style="font-size: 3rem;">تم الاختراق بنجاح!</h2>
            <p>أهلاً بك في القاعدة المركزية لأزرد</p>
            <br>
            <button class="btn btn-pioneer" onclick="location.reload()">خروج آمن</button>
        </div>
    </div>
 <script type="module">
        // استدعاء ترسانة Firebase القوية
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعدادات الربط مع قاعدة بيانات أزرد المركزية
        const firebaseConfig = {
            apiKey: "AIzaSyBDWT4ygUDKlmuelK6EXcyigkeNyQNCFtjW",
            authDomain: "azrad-global.firebaseapp.com",
            projectId: "azrad-global",
            appId: "1:727549676844:web:8b474f550e664f34397089"
        };

        // تشغيل المحرك
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // تفعيل الكود السري (Client ID) الذي أرسلته في الصورة لضمان الربط
        provider.setCustomParameters({
            'client_id': '727549676844-a3i6n3s14pqlmtti184s74453uief9r9.apps.googleusercontent.com',
            'prompt': 'select_account'
        });

        // 🟢 وظيفة الدخول بجوجل (The Titan Login)
        const googleBtn = document.getElementById('google-btn');
        googleBtn.onclick = async () => {
            console.log("جاري محاولة اختراق بوابة جوجل...");
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // تفعيل شاشة الجمدان والترحيب
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                document.getElementById('user-welcome').innerText = `أهلاً بك يا بطل: ${user.displayName}`;
                
                // إخفاء الإعلانات الجانبية عند الدخول لزيادة التركيز
                document.getElementById('ads').style.display = 'none';
            } catch (error) {
                console.error("عطل فني:", error.message);
                alert("!! تنبيه أمان !!\nتأكد من إضافة رابط الـ GitHub الخاص بك في Authorized Domains داخل إعدادات Firebase ليعمل الدخول.");
            }
        };

        // 📡 نظام توليد الإعلانات التلقائي (بالهبل)
        const adStream = document.getElementById('ads');
        const adContents = [
            { icon: 'fa-user-ninja', title: 'فرقة النخبة', text: 'انضم لـ 250 مقاتل رقمي الآن.' },
            { icon: 'fa-biohazard', title: 'تحذير أمان', text: 'نظام التشفير يعمل بأقصى طاقة.' },
            { icon: 'fa-satellite', title: 'الرادار الميداني', text: 'تم تحديث خرائط الإغاثة فوراً.' }
        ];

        setInterval(() => {
            const randomAd = adContents[Math.floor(Math.random() * adContents.length)];
            const adDiv = document.createElement('div');
            adDiv.className = 'ad-box';
            adDiv.innerHTML = `
                <button class="close-ad" onclick="this.parentElement.remove()">×</button>
                <i class="fas ${randomAd.icon}"></i>
                <h4>${randomAd.title}</h4>
                <p>${randomAd.text}</p>
            `;
            adStream.appendChild(adDiv);
            
            // مسح الإعلانات القديمة تلقائياً عشان الزحمة
            if (adStream.children.length > 5) {
                adStream.removeChild(adStream.firstChild);
            }
        }, 8000);

        // مراقبة الحالة (لو المستخدم مسجل دخول أصلاً)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                document.getElementById('user-welcome').innerText = `البطل ${user.displayName} متصل الآن`;
            }
        });
    </script>
</body>
</html>
