<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRAD | نظام التوثيق السيادي</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="main-container">
        <div id="authContainer" class="glass-card anim-slide-up">
            
            <div id="statusMessage" class="hidden"></div>

            <div class="brand-header">
                <div class="logo-wrapper">
                    <img src="icon.png" alt="AZRAD" id="mainLogo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968204.png'">
                </div>
                <h1>AZRAD</h1>
                <div class="security-tag">
                    <i class="fas fa-fingerprint"></i>
                    <span>نظام التوثيق المتعدد الطبقات</span>
                </div>
            </div>

            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active" onclick="toggleAuth('login')">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <button id="signupTab" class="tab-btn" onclick="toggleAuth('signup')">
                    <i class="fas fa-user-plus"></i> إنشاء سيادة
                </button>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="logEmail" placeholder="البريد الإلكتروني" required autocomplete="email">
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="logPass" placeholder="كلمة المرور" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="btn-text">دخول آمن</span>
                    <i class="fas fa-shield-halved"></i>
                </button>
                <div class="form-footer">
                    <button type="button" onclick="handleReset()" class="link-btn">نسيت مفتاح الوصول؟</button>
                </div>
            </form>

            <form id="signupForm" class="auth-form hidden" onsubmit="handleSignup(event)">
                <div class="input-field">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="newName" placeholder="الاسم الرباعي الكامل" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-at"></i>
                    <input type="email" id="newEmail" placeholder="البريد الإلكتروني الرسمي" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="newPass" placeholder="كلمة مرور صخرية (8+)" oninput="checkStrength(this.value)" required>
                </div>
                
                <div class="strength-meter-container">
                    <div class="meter-label">قوة التشفير:</div>
                    <div class="strength-meter">
                        <div id="strengthBar"></div>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit btn-signup">
                    <span class="btn-text">بدء عملية التوثيق</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="social-divider">
                <span>أو الارتباط عبر</span>
            </div>

            <button class="google-auth-btn" onclick="handleGoogle()">
                <img src="https://developers.google.com/static/identity/images/g-logo.png" alt="Google">
                <span>التحقق عبر Google</span>
            </button>

            <div id="recaptcha-container"></div>
        </div>

        <div id="appContainer" class="glass-card hidden">
            <div class="app-header">
                <div class="success-animation">
                    <i class="fas fa-check-circle pulse"></i>
                </div>
                <h2 id="welcomeName">مرحباً بك</h2>
                <div class="verification-badge">
                    <i class="fas fa-user-check"></i> هوية موثقة رقمياً
                </div>
            </div>
            
            <div class="app-body">
                <p>لقد اجتزت بروتوكولات الأمان بنجاح. بريدك الآن مرتبط بنظام AZRAD المركزي.</p>
            </div>

            <button onclick="handleLogout()" class="btn-logout">
                <i class="fas fa-power-off"></i>
                تسجيل الخروج الآمن
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="ui.js"></script>
</body>
</html>
