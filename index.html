<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أَزْرَد | AZRAD OS</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loader">
        <div class="dna-spinner"></div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">INITIALIZING AZRAD GLOBAL NETWORK...</p>
    </div>

    <section id="auth-screen">
        <div class="video-bg-overlay"></div>
        <div class="auth-container">
            <div class="glass-box">
                <div class="pioneer-tag">أول 250 منقذ</div>
                <h1 class="brand-logo">أَزْرَد</h1>
                <p class="brand-slogan">رادار النجدة الذكي | الإصدار العالمي</p>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <span id="pioneer-count">250</span>
                        <small>مقعد متبقي</small>
                    </div>
                    <div class="stat-item">
                        <span id="live-users">--</span>
                        <small>نشط الآن</small>
                    </div>
                </div>

                <div class="auth-actions">
                    <button id="loginBtn" class="btn-main-gold">
                        <i class="fab fa-google"></i>
                        <span>دخول آمن عبر جوجل</span>
                    </button>
                    <button id="guestBtn" class="btn-outline-white">
                        <i class="fas fa-eye"></i>
                        <span>تصفح كضيف</span>
                    </button>
                </div>

                <div class="security-info">
                    <i class="fas fa-user-shield"></i>
                    <span>بياناتك مشفرة ولا تظهر لأحد</span>
                </div>
            </div>
        </div>
    </section>

    <section id="app-interface" style="display: none;">
        <header class="hud-header">
            <div class="user-pill" onclick="openProfile()">
                <div class="avatar-box">
                    <img id="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="">
                    <div id="pioneer-badge" class="badge-icon">🏆</div>
                </div>
                <div class="user-text">
                    <strong id="display-name">بطل أَزْرَد</strong>
                    <span id="user-rank">الرتبة: منقذ</span>
                </div>
            </div>
            <div class="system-time" id="clock">00:00:00</div>
        </header>

        <main id="map-container">
            <div id="map"></div>
            <div class="map-controls">
                <button onclick="locateMe()" class="map-btn"><i class="fas fa-location-crosshairs"></i></button>
                <button onclick="toggleMapMode()" class="map-btn"><i class="fas fa-layer-group"></i></button>
            </div>
            <div id="ai-notif-area"></div>
        </main>

        <footer class="bottom-nav">
            <div class="nav-item" onclick="showTab('chat')">
                <i class="fas fa-message"></i>
                <span>الدردشة</span>
            </div>

            <div class="sos-trigger">
                <button id="sosBtn" class="sos-circle">
                    <div class="sos-pulse"></div>
                    <div class="sos-inner">SOS</div>
                </button>
            </div>

            <div class="nav-item" onclick="showTab('rankings')">
                <i class="fas fa-ranking-star"></i>
                <span>المتصدرين</span>
            </div>
        </footer>
    </section>

    <div id="chat-panel" class="side-drawer">
        <div class="drawer-header">
            <h3>رادار الدردشة الحي</h3>
            <button onclick="closeTab()"><i class="fas fa-chevron-down"></i></button>
        </div>
        <div id="chat-msgs" class="chat-content"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="اكتب رسالة للمنقذين...">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
