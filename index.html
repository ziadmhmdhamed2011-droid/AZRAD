<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أَزْرَد | AZRAD Global Trust</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #001a33; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        #map { height: 450px; width: 100%; max-width: 900px; margin: 20px auto; border: 3px solid #D4AF37; border-radius: 20px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .btn-azrad { background: linear-gradient(45deg, #D4AF37, #F2D06B); color: #001a33; padding: 15px 40px; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-azrad:hover { transform: scale(1.05); background: #fff; }
        .status-bar { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; display: inline-block; margin-top: 10px; border: 1px solid #D4AF37; }
    </style>
</head>
<body>

    <h1>🛡️ مَنصة أَزْرَد (AZRAD)</h1>
    <p>نظام السند العالمي - موثق بالذكاء الاصطناعي</p>
    
    <div id="map"></div>

    <button class="btn-azrad" onclick="sendAzradHelp()">إرسال نداء استغاثة عالمي</button>
    <br>
    <div class="status-bar" id="status">النظام: متصل بسيرفرات جوجل عالمياً ✅</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // بياناتك الحقيقية التي أحضرتها
        const firebaseConfig = {
            apiKey: "AIzaSyBDWT4ygUDklmueK6EXcyigkeNyQNCfTjw",
            authDomain: "azrad-global.firebaseapp.com",
            projectId: "azrad-global",
            storageBucket: "azrad-global.firebasestorage.app",
            messagingSenderId: "727549676844",
            appId: "1:727549676844:web:8b474f550e664f34397089"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // خوارزمية "بصمة الجهاز" لمنع الغش (النزاهة الرقمية)
        const deviceID = btoa(navigator.userAgent).substring(0, 15);

        window.sendAzradHelp = () => {
            document.getElementById('status').innerText = "جاري تشفير النداء...";
            
            const helpRef = ref(db, 'azrad_signals');
            const newSignal = push(helpRef);
            
            set(newSignal, {
                sender: deviceID,
                type: "طلب مساعدة عاجلة",
                timestamp: Date.now(),
                location: "جاري التحديد..."
            }).then(() => {
                alert("تم إرسال نداءك! بصمة جهازك الموثقة هي: " + deviceID);
                document.getElementById('status').innerText = "تم الإرسال بنجاح ✅";
            }).catch((error) => {
                alert("خطأ: تأكد من تفعيل Rules في Firebase إلى true");
            });
        };

        // تشغيل الخريطة
        var map = L.map('map').setView([24.7136, 46.6753], 3);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
