<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRAD | بوابة النخبة العالمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Public+Sans:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37; /* الذهب الملكي */
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4d4d;
            --success: #00e676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تصميم الحاوية الرئيسي (بساطة عالمية) */
        .master-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #222;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* الشعار والعداد */
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; color: var(--primary); }
        .elite-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* نموذج الإدخال */
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-wrapper i { position: absolute; right: 15px; top: 15px; color: #555; transition: 0.3s; }
        
        input, select {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: #000;
            border: 1px solid #222;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        input:focus + i { color: var(--primary); }

        /* الأزرار */
        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main:hover { transform: translateY(-3px); filter: brightness(1.1); }
        
        .btn-google {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #fff;
            color: #000;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* نظام التنبيهات البشري */
        #alert-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 10000;
            display: none;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        .hidden { display: none !important; }
        
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .toggle-text span { color: var(--primary); cursor: pointer; text-decoration: underline; }

        /* شاشة النجاح */
        .success-content { text-align: center; }
        .success-content i { font-size: 5rem; color: var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="alert-box"></div>

    <div class="master-container">
        <div class="auth-card" id="login-card">
            <div class="brand">
                <h1>AZRAD</h1>
                <div class="elite-badge">باقي <span id="seats-num">250</span> مكان للنخبة</div>
            </div>

            <div id="login-form">
                <div class="input-wrapper">
                    <input type="email" id="login-email" placeholder="بريدك الإلكتروني">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="login-pass" placeholder="كلمة المرور">
                    <i class="fas fa-lock"></i>
                </div>
                <button class="btn-main" onclick="processAuth('login')">تسجيل الدخول</button>
                <button class="btn-google" onclick="processAuth('google')">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                    دخول سريع عبر جوجل
                </button>
                <p class="toggle-text">جديد هنا؟ <span onclick="switchCard('signup')">انضم للنخبة الآن</span></p>
            </div>
        </div>

        <div class="auth-card hidden" id="signup-card">
            <div class="brand">
                <h1>JOIN</h1>
                <p style="font-size: 0.8rem; color: var(--text-dim);">أكمل ملفك الشخصي لتصبح عضواً مؤسساً</p>
            </div>

            <div class="input-wrapper">
                <input type="text" id="user-full-name" placeholder="الاسم الرباعي">
                <i class="fas fa-user"></i>
            </div>
            <div class="input-wrapper">
                <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
                <i class="fas fa-at"></i>
            </div>
            <div class="input-wrapper">
                <select id="user-country">
                    <option value="">اختر الدولة</option>
                    <option value="SA">السعودية</option>
                    <option value="EG">مصر</option>
                    <option value="UAE">الإمارات</option>
                    <option value="KW">الكويت</option>
                </select>
                <i class="fas fa-globe"></i>
            </div>
            <div class="input-wrapper">
                <input type="password" id="reg-pass" placeholder="كلمة مرور قوية">
                <i class="fas fa-shield-alt"></i>
            </div>

            <button class="btn-main" onclick="processAuth('signup')">تأكيد الانضمام</button>
            <p class="toggle-text">لديك حساب؟ <span onclick="switchCard('login')">العودة للدخول</span></p>
        </div>

        <div class="auth-card hidden" id="success-card">
            <div class="success-content">
                <i class="fas fa-check-double"></i>
                <h2 id="welcome-msg">مرحباً بك أيها البطل</h2>
                <p style="margin: 20px 0; color: var(--text-dim);">تم توثيق حسابك في قاعدة بيانات أزرد العالمية.</p>
                <button class="btn-main" onclick="location.reload()">خروج آمن</button>
            </div>
        </div>
        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/database.js";

        // [1] التكوين السيادي للنظام
        const firebaseConfig = {
            apiKey: "AIzaSyBDWT4ygUDklmueK6EXcyigkeNyQNCfTjw",
            authDomain: "azrad-global.firebaseapp.com",
            projectId: "azrad-global",
            databaseURL: "https://azrad-global-default-rtdb.firebaseio.com",
            appId: "1:727549676844:web:8b474f550e664f34397089"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // [2] نظام التنبيهات البشري (Human Language Alerts)
        window.showAlert = (msg, type = 'error') => {
            const box = document.getElementById('alert-box');
            box.innerText = msg;
            box.style.display = 'block';
            box.style.background = type === 'error' ? '#ff4d4d' : '#d4af37';
            box.style.color = type === 'error' ? 'white' : 'black';
            
            setTimeout(() => { box.style.display = 'none'; }, 4000);
        };

        // [3] إدارة العداد (Live Seats Counter)
        const seatsRef = ref(db, 'system/seats_count');
        onValue(seatsRef, (snapshot) => {
            const count = snapshot.val() || 250;
            document.getElementById('seats-num').innerText = count;
        });

        // [4] نظام التبديل بين الكروت (Smooth Transition)
        window.switchCard = (target) => {
            const loginCard = document.getElementById('login-card');
            const signupCard = document.getElementById('signup-card');
            
            if (target === 'signup') {
                loginCard.classList.add('animate__animated', 'animate__fadeOutLeft');
                setTimeout(() => {
                    loginCard.classList.add('hidden');
                    signupCard.classList.remove('hidden');
                    signupCard.classList.add('animate__animated', 'animate__fadeInRight');
                }, 500);
            } else {
                signupCard.classList.add('animate__animated', 'animate__fadeOutRight');
                setTimeout(() => {
                    signupCard.classList.add('hidden');
                    loginCard.classList.remove('hidden');
                    loginCard.classList.add('animate__animated', 'animate__fadeInLeft');
                }, 500);
            }
        };

        // [5] محرك المعالجة الرئيسي (The Master Processor)
        window.processAuth = async (method) => {
            try {
                let user;
                if (method === 'google') {
                    const result = await signInWithPopup(auth, provider);
                    user = result.user;
                    await syncUserToDatabase(user, "تسجيل دخول سريع");
                } 
                else if (method === 'login') {
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-pass').value;
                    if (!email || !pass) return showAlert("يا بطل، الخانات فاضية.. محتاجين بياناتك!");
                    
                    const result = await signInWithEmailAndPassword(auth, email, pass);
                    user = result.user;
                } 
                else if (method === 'signup') {
                    const name = document.getElementById('user-full-name').value;
                    const email = document.getElementById('reg-email').value;
                    const country = document.getElementById('user-country').value;
                    const pass = document.getElementById('reg-pass').value;

                    if (!name || !email || !country || !pass) return showAlert("من فضلك أكمل ملفك الشخصي لتنضم للنخبة");
                    if (pass.length < 6) return showAlert("كلمة المرور ضعيفة.. خلّيها أقوى من 6 أرقام");

                    const result = await createUserWithEmailAndPassword(auth, email, pass);
                    user = result.user;
                    await syncUserToDatabase(user, name, country);
                }

                showSuccessScreen(user.displayName || user.email);

            } catch (error) {
                handleFriendlyError(error.code);
            }
        };

        // [6] نظام مزامنة البيانات (The Global Database Sync)
        async function syncUserToDatabase(user, fullName = "عضو مؤسس", country = "غير محدد") {
            const userRef = ref(db, `users/${user.uid}`);
            const snapshot = await get(userRef);

            if (!snapshot.exists()) {
                // إذا كان مستخدم جديد، نسجل بياناته وننقص مقعد
                await set(userRef, {
                    name: fullName,
                    email: user.email,
                    country: country,
                    joinDate: new Date().toISOString(),
                    role: "Elite",
                    balance: 10 // هدية الانضمام
                });

                await runTransaction(seatsRef, (current) => (current || 250) - 1);
                showAlert(`أهلاً بك يا ${fullName}.. حصلت على 10 عملات هدية!`, 'success');
            }
        }

        // [7] مترجم الأخطاء البشري
        function handleFriendlyError(code) {
            switch (code) {
                case 'auth/invalid-email': showAlert("الإيميل ده مش مظبوط، اتأكد منه تاني."); break;
                case 'auth/user-not-found': showAlert("مش لاقيين حسابك.. جرب تسجل من جديد."); break;
                case 'auth/wrong-password': showAlert("الباسورد غلط.. حاول تفتكرها يا بطل."); break;
                case 'auth/email-already-in-use': showAlert("الإيميل ده مسجل عندنا فعلاً.. جرب تدخل بيه."); break;
                default: showAlert("حصل حاجة غريبة في النظام.. حاول تاني كمان شوية.");
            }
        }

        function showSuccessScreen(name) {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('signup-card').classList.add('hidden');
            document.getElementById('success-card').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `أهلاً بك، ${name}`;
            console.log("Welcome to AZRAD Elite Network");
        }
            // ============================================================
        // [SECTION 8: THE ALPHA-WALLET SYSTEM] 
        // نظام المحفظة الرقمية وتوليد العملات المشفرة لأزرد
        // ============================================================
        
        async function initializeUserWallet(userId) {
            const walletRef = ref(db, `wallets/${userId}`);
            const userRef = ref(db, `users/${userId}`);
            
            try {
                const snapshot = await get(walletRef);
                if (!snapshot.exists()) {
                    console.log("%c[SYSTEM] Creating New Secure Wallet...", "color: #d4af37");
                    await set(walletRef, {
                        balance: 100, // منحة التأسيس للأبطال
                        currency: "AZ-Coin",
                        lastTransaction: new Date().toISOString(),
                        status: "Active",
                        securityLevel: "High"
                    });
                }
                renderWalletUI(userId);
            } catch (error) {
                console.error("Wallet Sync Error:", error);
            }
        }

        function renderWalletUI(userId) {
            const successCard = document.getElementById('success-card');
            const walletHTML = `
                <div id="user-wallet" style="margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 15px; text-align: right;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <span style="color: #d4af37; font-weight: bold;"><i class="fas fa-wallet"></i> محفظة النخبة</span>
                        <span id="wallet-status" style="font-size: 0.7rem; color: #00ff88;">● متصلة</span>
                    </div>
                    <div style="font-size: 2rem; font-weight: 900; color: #fff;">
                        <span id="balance-amount">--</span> <small style="font-size: 0.8rem; color: #d4af37;">AZ-C</small>
                    </div>
                    <p style="font-size: 0.7rem; color: #666; margin-top: 10px;">سيتم تفعيل سوق المقايضة عند اكتمال الـ 250 بطل.</p>
                </div>
            `;
            // إضافة المحفظة لشاشة النجاح بدون مسح المحتوى القديم
            const content = successCard.querySelector('.success-content');
            if(!document.getElementById('user-wallet')) {
                content.insertAdjacentHTML('beforeend', walletHTML);
            }
            
            // تحديث الرصيد لحظياً من قاعدة البيانات
            const balRef = ref(db, `wallets/${userId}/balance`);
            onValue(balRef, (snap) => {
                const amt = snap.val();
                document.getElementById('balance-amount').innerText = amt || 0;
            });
        }

        // ============================================================
        // [SECTION 9: THE OMNI-GUARD ANTI-CHEAT]
        // رادار كشف البوتات والهاكرز والعمليات الوهمية
        // ============================================================

        window.activateOmniGuard = () => {
            console.log("%c[GUARD] Omni-Guard Neural Network: ONLINE", "color: #ff4d4d; font-weight: bold;");
            
            // 1. كشف الـ Automation (البوتات)
            let mouseMoving = false;
            document.addEventListener('mousemove', () => { mouseMoving = true; });

            // 2. كشف الـ Multiple Tabs (منع التكرار)
            const sessionKey = 'az_session_' + Math.random();
            localStorage.setItem('active_session', sessionKey);
            
            window.addEventListener('storage', () => {
                if (localStorage.getItem('active_session') !== sessionKey) {
                    showAlert("تم رصد فتح الموقع في نافذة أخرى.. سيتم إغلاق هذه الجلسة للأمان.");
                    setTimeout(() => { location.href = "about:blank"; }, 2000);
                }
            });

            // 3. منع محاولات التلاعب بالـ Console
            const checkDevTools = () => {
                const widthThreshold = window.outerWidth - window.innerWidth > 160;
                const heightThreshold = window.outerHeight - window.innerHeight > 160;
                if (widthThreshold || heightThreshold) {
                    console.warn("Security Alert: Developer Tools Detected.");
                }
            };
            setInterval(checkDevTools, 5000);
        };

        // ============================================================
        // [SECTION 10: INITIALIZATION BOOTSTRAP]
        // إقلاع النظام النهائي وربط كل الخيوط ببعضها
        // ============================================================

        window.addEventListener('DOMContentLoaded', () => {
            activateOmniGuard();
            
            // مراقبة حالة المستخدم (هل هو مسجل دخول بالفعل؟)
            auth.onAuthStateChanged((user) => {
                if (user) {
                    console.log("Session Valid: Active User Detected.");
                    showSuccessScreen(user.displayName || user.email);
                    initializeUserWallet(user.uid);
                } else {
                    console.log("No Session: Redirecting to Portal.");
                }
            });
            
            // تأثير بصري "الفيد" عند الدخول
            document.querySelector('.master-container').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.master-container').style.transition = 'opacity 1.5s ease';
                document.querySelector('.master-container').style.opacity = '1';
            }, 500);
        });

        // رسالة ترحيبية للمطور في الكونسول (هيبة الموقع)
        console.log(`
        %c----------------------------------------------------
        %c|  AZRAD GLOBAL SYSTEM  |  VER 4.5.0  |  SECURED   |
        %c----------------------------------------------------
        `, "color: #d4af37", "color: #fff; background: #000", "color: #d4af37");

        // [END OF LOGIC - SYSTEM STANDBY]
    </script>
</body>
</html>
    </div>
