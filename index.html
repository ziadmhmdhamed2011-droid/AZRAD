<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZRAD | Global Sovereign</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background-color: var(--black);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية التطبيق */
        .azrad-wrapper {
            width: 100%;
            max-width: 410px;
            padding: 20px;
            perspective: 1000px;
        }

        .main-card {
            background: rgba(15, 15, 15, 0.95);
            border-radius: 45px;
            padding: 45px 30px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            backdrop-filter: blur(15px);
        }

        .logo-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .seats-tag {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 40px;
        }

        /* نظام المدخلات */
        .input-box { margin-bottom: 20px; position: relative; }
        
        input {
            width: 100%;
            padding: 18px 25px;
            background: var(--glass);
            border: 1px solid #222;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            text-align: center;
        }

        input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* الأزرار */
        .btn-prime {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: var(--gold);
            color: black;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: var(--transition);
        }

        .btn-google {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #333;
            background: white;
            color: black;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-prime:active { transform: scale(0.96); }

        /* التنبيهات */
        #notify {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 350px;
            background: var(--gold); color: black;
            padding: 15px; border-radius: 20px;
            font-weight: bold; text-align: center;
            transition: 0.5s; z-index: 9999;
        }

        .hidden { display: none !important; }

        /* شاشة المحفظة */
        .wallet-display {
            background: #000;
            padding: 35px 20px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div id="notify">نظام أزرد متاح</div>

    <div class="azrad-wrapper">
        <div class="main-card">
            <div class="logo-area">
                <h1>AZRAD</h1>
                <div class="seats-tag">المقاعد المتاحة: <span id="seats-num">250</span></div>
            </div>

            <div id="box-login">
                <div class="input-box"><input type="email" id="login-email" placeholder="البريد الإلكتروني"></div>
                <div class="input-box"><input type="password" id="login-pass" placeholder="كلمة المرور"></div>
                <button class="btn-prime" onclick="window.masterAuth('login')">تسجيل الدخول</button>
                <button class="btn-google" onclick="window.masterAuth('google')">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> المتابعة عبر جوجل
                </button>
                <p style="margin-top:25px; color:#555">ليس لديك حساب؟ <span style="color:var(--gold); cursor:pointer" onclick="window.goView('signup')">اشترك الآن</span></p>
            </div>

            <div id="box-signup" class="hidden">
                <div class="input-box"><input type="text" id="reg-name" placeholder="الاسم بالكامل"></div>
                <div class="input-box"><input type="email" id="reg-email" placeholder="البريد الإلكتروني"></div>
                <div class="input-box"><input type="password" id="reg-pass" placeholder="كلمة السر (6+)"></div>
                <button class="btn-prime" onclick="window.masterAuth('signup')">تأكيد الانضمام</button>
                <p style="margin-top:25px; color:#555">مسجل بالفعل؟ <span style="color:var(--gold); cursor:pointer" onclick="window.goView('login')">دخول</span></p>
            </div>

            <div id="box-success" class="hidden">
                <h2 id="welcome-msg" style="font-weight:900;">مرحباً أيها البطل</h2>
                <div class="wallet-display">
                    <p style="color:var(--gold); font-size: 0.8rem; margin-bottom:10px;">رصيد العملات المتاحة</p>
                    <h1 style="font-size: 3.5rem; font-family: 'Orbitron';"><span id="user-bal">0</span> <small style="font-size: 1rem; color:#444">AZC</small></h1>
                </div>
                <button class="btn-prime" style="background:transparent; border:1px solid #222; color:#555; margin-top:30px;" onclick="window.masterLogout()">تسجيل الخروج الآمن</button>
            </div>
        </div>
    </div>

    <script>
        // [1] الإعدادات الرسمية - مربوطة بأمان
        const config = {
            apiKey: "AIzaSyBDWT4ygUDklmueK6EXcyigkeNyQNCfTjw",
            authDomain: "azrad-global.firebaseapp.com",
            projectId: "azrad-global",
            databaseURL: "https://azrad-global-default-rtdb.firebaseio.com",
            appId: "1:727549676844:web:8b474f550e664f34397089"
        };

        // تشغيل الأنظمة
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // [2] دوال الواجهة (مربوطة بـ Window لضمان العمل)
        window.alertBox = (msg) => {
            const n = document.getElementById('notify');
            n.innerText = msg; n.style.top = '20px';
            setTimeout(() => n.style.top = '-100px', 3500);
        };

        window.goView = (v) => {
            document.getElementById('box-login').classList.add('hidden');
            document.getElementById('box-signup').classList.add('hidden');
            document.getElementById('box-success').classList.add('hidden');
            document.getElementById('box-' + v).classList.remove('hidden');
        };

        // [3] المحرك الرئيسي للهوية (Authentication)
        window.masterAuth = async (mode) => {
            try {
                let user;
                if (mode === 'google') {
                    const res = await auth.signInWithPopup(googleProvider);
                    user = res.user;
                    await syncProfile(user, user.displayName);
                } else if (mode === 'login') {
                    const e = document.getElementById('login-email').value;
                    const p = document.getElementById('login-pass').value;
                    if(!e || !p) return alertBox("املأ البيانات أولاً!");
                    const res = await auth.signInWithEmailAndPassword(e, p);
                    user = res.user;
                } else if (mode === 'signup') {
                    const n = document.getElementById('reg-name').value;
                    const e = document.getElementById('reg-email').value;
                    const p = document.getElementById('reg-pass').value;
                    if(!n || !e || !p) return alertBox("البيانات ناقصة!");
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    user = res.user;
                    await syncProfile(user, n);
                }
                setupDashboard(user);
            } catch (err) { alertBox("خطأ: " + err.message); }
        };

        async function syncProfile(user, name) {
            const uRef = db.ref(`users/${user.uid}`);
            const snap = await uRef.once('value');
            if (!snap.exists()) {
                await uRef.set({ name, balance: 100, created: Date.now() });
                await db.ref('system/seats').transaction(c => (c || 250) - 1);
            }
        }

        function setupDashboard(user) {
            window.goView('success');
            db.ref(`users/${user.uid}`).on('value', (s) => {
                const data = s.val();
                if(data) {
                    document.getElementById('welcome-msg').innerText = `أهلاً ${data.name}`;
                    document.getElementById('user-bal').innerText = data.balance || 0;
                }
            });
        }

        window.masterLogout = () => { auth.signOut(); location.reload(); };

        // [4] المراقبة اللحظية
        auth.onAuthStateChanged(u => { if(u) setupDashboard(u); });
        db.ref('system/seats').on('value', s => document.getElementById('seats-num').innerText = s.val() || 250);

        // اهتزاز الموبايل عند الضغط
        document.querySelectorAll('button').forEach(b => {
            b.onclick = () => { if(navigator.vibrate) navigator.vibrate(40); };
        });

        console.log("AZRAD SYSTEM: OPERATIONAL");
    </script>
</body>
</html>
