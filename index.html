    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --gold: #D4AF37; --navy: #001f3f; --dark: #000b1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: var(--dark); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: white;
        }

        /* التصميم الأسطوري للخلفية */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, var(--navy) 0%, var(--dark) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* الشاشة الرئيسية */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-bottom: 10px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        /* أزرار الدخول */
        .btn-group { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google { background: white; color: black; }
        .btn-pioneer { background: var(--gold); color: var(--navy); }

        /* نظام الإعلانات الجانبية (الأسطوري) */
        .ad-sidebar {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ad-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-right: 4px solid var(--gold);
            padding: 15px;
            border-radius: 8px;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        .ad-card i { color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }
        .close-ad {
            position: absolute;
            top: 5px; left: 5px;
            background: none; border: none;
            color: white; font-size: 1.2rem; cursor: pointer;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* إخفاء العناصر عند الدخول */
        .hidden { display: none !important; }
    </style>
</head>
