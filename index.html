<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRAD | تسجيل الدخول | السيادة الرقمية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<div class="auth-wrapper">
    <div id="authContainer" class="auth-container card-shadow">
        <div class="logo-area">
            <img src="icon.png" alt="AZRAD Logo" class="logo-img">
            <h1>AZRAD</h1>
            <p>السيادة الرقمية تبدأ من هنا</p>
        </div>

        <div class="tabs">
            <button id="loginTab" class="active" onclick="showAuthTab('login')">تسجيل دخول</button>
            <button id="signupTab" onclick="showAuthTab('signup')">إنشاء حساب</button>
        </div>

        <form id="loginForm" class="auth-form anim-slide-in">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="كلمة المرور" required>
                <i class="fas fa-lock"></i>
            </div>
            <div class="form-options">
                <a href="#" class="forgot-pass" onclick="resetPassword()">نسيت كلمة المرور؟</a>
            </div>
            <button type="submit" id="btnLogin" class="btn-main">دخول</button>
        </form>

        <form id="signupForm" class="auth-form hidden anim-slide-in">
            <div class="input-group">
                <input type="text" id="newName" placeholder="الاسم الكامل" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="email" id="newEmail" placeholder="البريد الإلكتروني" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" id="newPass" placeholder="كلمة مرور قوية" oninput="checkPassStrength(this.value)" required>
                <i class="fas fa-lock"></i>
                <div class="strength-bar"><div id="passStrengthIndicator"></div></div>
            </div>
            <button type="submit" id="btnSignup" class="btn-main">إنشاء الحساب</button>
        </form>

        <div class="divider"><span>أو</span></div>

     <button class="btn-google" onclick="initSignInWithGoogle()">
    <img src="https://developers.google.com/static/identity/images/g-logo.png" alt="Google" style="width:20px; margin-left:10px;">
    الدخول بواسطة جوجل
</button>
        
        <div id="recaptcha-container"></div>
    </div>

    <div id="appContainer" class="app-container hidden card-shadow">
        <div class="user-profile">
            <img src="" alt="User Avatar" id="userAvatar">
            <h2>مرحباً، <span id="userNamePlaceholder"></span></h2>
            <p id="userEmailPlaceholder"></p>
        </div>
        <button onclick="initSignOut()" class="btn-logout">تسجيل خروج</button>
    </div>
</div>


<script src="config.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
</body>
</html>
